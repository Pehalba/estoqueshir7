<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — SHIR7</title>
  <link rel="stylesheet" href="../src/css/main.css">
</head>
<body data-page="dashboard">
  <div class="app-layout">
    <aside id="sidebar" class="sidebar">
      <div class="sidebar__brand">
        <img class="sidebar__logo" src="../src/assets/logo-shir7.png" alt="SHIR7" width="36" height="36">
        <span class="sidebar__brand-name">SHIR7</span>
      </div>
      <nav class="sidebar__nav">
        <a href="dashboard.html" class="sidebar__link sidebar__link--active" data-nav="dashboard">
          <span class="sidebar__link-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></span>
          Dashboard
        </a>
        <a href="inventory.html" class="sidebar__link" data-nav="inventory">
          <span class="sidebar__link-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg></span>
          Estoque
        </a>
        <a href="sales.html" class="sidebar__link" data-nav="sales">
          <span class="sidebar__link-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg></span>
          Vendas
        </a>
        <a href="investors.html" class="sidebar__link" data-nav="investors">
          <span class="sidebar__link-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span>
          Investidores
        </a>
        <a href="reports.html" class="sidebar__link" data-nav="reports">
          <span class="sidebar__link-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></span>
          Relatórios
        </a>
      </nav>
    </aside>

    <div id="sidebar-overlay" class="sidebar__overlay"></div>

    <div class="app-layout__main">
      <header class="header">
        <div class="header__left">
          <button type="button" id="menu-btn" class="header__menu-btn" aria-label="Abrir menu">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <h1 class="header__title">Dashboard</h1>
        </div>
        <div class="header__right">
          <div class="header__user">
            <span class="header__user-email" id="user-email"></span>
          </div>
          <button type="button" id="logout-btn" class="btn btn--ghost btn--sm">Sair</button>
        </div>
      </header>

      <main class="app-layout__content">
        <div class="page-header">
          <h2 class="page-header__title">Visão Geral</h2>
          <p class="page-header__subtitle">Resumo do seu negócio — disponível na Fase 6</p>
        </div>

        <div class="card card--placeholder">
          <svg class="card__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          <p>Cards e gráficos serão implementados na Fase 6</p>
        </div>
      </main>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <script type="module" src="../src/js/app.js"></script>
  <script type="module" src="../src/js/pages/dashboard.js"></script>
</body>
</html>
